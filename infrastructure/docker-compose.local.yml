services:
  postgres:
    image: postgres:18-alpine
    container_name: taskmanager-db-pg
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    networks:
      - taskmanager-local
  mongodb:
    image: mongo:latest
    container_name: taskmanager-db-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - taskmanager-local
  api:
    build:
      context: ../api
      dockerfile: ../infrastructure/Dockerfile.local
    container_name: taskmanager-api
    depends_on:
      - postgres
      - mongodb
    env_file: .env
    ports:
      - "3000:3000"
      - "9229:9229"
    volumes:
      - ../api:/usr/src/app
    networks:
      - taskmanager-local
  redis:
    image: redis:8
    container_name: redis_taskmanager_node
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    networks:
      - taskmanager-local

networks:
  taskmanager-local:
    driver: bridge

volumes:
  pgdata:
  mongodata:
  redisdata:
